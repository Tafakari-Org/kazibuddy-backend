services:
  db:
    image: postgres:17
    container_name: kazi-buddy-backend-db
    restart: always
    environment:
      POSTGRES_DB: tafakaridb
    env_file:
      - ./tafakari/.env
    ports:
      - "5432:5432"
    volumes:
      - tafakari_db:/var/lib/postgresql/data
    networks:
      - kazi-network
  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: kazi-buddy-backend-local
    command: daphne -b 0.0.0.0 -p 8000 tafakari.asgi:application
    volumes:
      - ./tafakari:/app/tafakari
      - static_volume:/app/tafakari/staticfiles
      - uploads_volume:/app/tafakari/uploads
    ports:
      - "8000:8000"
    env_file:
      - ./tafakari/.env
    depends_on:
      - db
    networks:
      - kazi-network
    restart: unless-stopped

volumes:
  static_volume:
  uploads_volume:
  tafakari_db:

networks:
  kazi-network:
    driver: bridge
