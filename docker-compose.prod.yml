services:
  # Django Web Application
  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: kazi-buddy-backend-prod
    command: daphne -b 0.0.0.0 -p 8000 tafakari.asgi:application
    volumes:
      - static_volume:/app/tafakari/staticfiles
      - /var/www/kazibuddy-backend/uploads:/app/tafakari/uploads
    ports:
      - "8000:8000"
    env_file:
      - ./tafakari/.env
    environment:
      - DEBUG=False
    networks:
      - kazi-network-prod
    restart: always

volumes:
  static_volume:

  

networks:
  kazi-network-prod:
    driver: bridge
