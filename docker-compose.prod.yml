services:
  #Database
  db:
    image: postgres:17
    container_name: kazi-buddy-backend-db
    restart: always
    environment:
      POSTGRES_DB: tafakaridb
    env_file:
      - ./tafakari/.env
    ports:
      - "5432:5432"
    volumes:
      - tafakari_db:/var/lib/postgresql/data
    networks:
      - kazi-network-prod

  #Django Redis Application

  redis:
    image: redis:alpine
    container_name: kazi-buddy-redis
    restart: unless-stopped
    ports:
      - "6380:6380"
    networks:
      - kazi-network-prod
      
  # Django Web Application
  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: kazi-buddy-backend-prod
    command: daphne -b 0.0.0.0 -p 8000 tafakari.asgi:application
    volumes:
      - static_volume:/app/tafakari/staticfiles
      - /var/www/kazibuddy-backend/uploads:/app/tafakari/uploads
    ports:
      - "8000:8000"
    env_file:
      - ./tafakari/.env
    environment:
      - DEBUG=False
    networks:
      - kazi-network-prod
    restart: always

volumes:
  static_volume:
  tafakari_db:

  

networks:
  kazi-network-prod:
    driver: bridge
