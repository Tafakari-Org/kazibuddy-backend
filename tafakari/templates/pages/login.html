<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Sign In</title>
    <style>
        body {
            width: 100vw;
            height: 100vh;
            font-family: Arial, sans-serif;
        }

        .center {
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .container {
            width: 400px;
            padding: 20px;
            border: 1px solid gray;
            border-radius: 4px;
        }

        .title {
            text-align: center;
        }

        .google-btn {
            display: inline-block;
            padding: 10px 20px;
            background-color: #4285f4;
            color: white;
            text-decoration: none;
            border-radius: 4px;
            text-align: center;
            width: 100%;
            box-sizing: border-box;
        }

        .google-btn:hover {
            background-color: #357ae8;
        }

        .info-text {
            margin-top: 20px;
            padding: 10px;
            background-color: #f0f0f0;
            border-radius: 4px;
            font-size: 14px;
        }
    </style>
</head>

<body>
    <div class="center">
        <div class="container">
            <h1 class="title">Sign in</h1>

            <a href="#" id="google-login-btn" class="google-btn">
                Sign in with Google
            </a>

            <div class="info-text">
                <strong>Note:</strong> New accounts require admin approval before you can log in.
            </div>
        </div>
    </div>

    <script>
        // Build Google OAuth URL (no user_type needed)
        const googleBtn = document.getElementById('google-login-btn');

        googleBtn.addEventListener('click', function (e) {
            e.preventDefault();

            // Build Google OAuth URL without state parameter
            const googleAuthUrl = 'https://accounts.google.com/o/oauth2/v2/auth' +
                '?redirect_uri=' + encodeURIComponent('{{ google_callback_uri }}') +
                '&prompt=consent' +
                '&response_type=code' +
                '&client_id={{ google_client_id }}' +
                '&scope=openid%20email%20profile' +
                '&access_type=offline';

            // Redirect to Google
            window.location.href = googleAuthUrl;
        });
    </script>
</body>

</html>
